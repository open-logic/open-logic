files:
  include:
    - "../../../src/fix/**/*.vhd"  # Glob expressions for files to parse

exclude_entities:
  - "olo_fix_sim_*" # Simulation only
  - "olo_fix_to_real" # Simulation only
  - "olo_fix_private_*" # Private entities

entities:
  # olo_fix_abs
  - entity_name: "olo_fix_abs"
    configurations:
      - name: "1-8-8-->0-4-4"
        generics:
          AFmt_g: '"(1,8,8)"'
          ResultFmt_g: '"(0,4,4)"'
  # olo_fix_add
  - entity_name: "olo_fix_add"
    configurations:
      - name: "1-8-8-->0-4-4"
        generics:
          AFmt_g: '"(1,8,8)"'
          BFmt_g: '"(1,8,8)"'
          ResultFmt_g: '"(0,4,4)"'
  # olo_fix_addsub
  - entity_name: "olo_fix_addsub"
    configurations:
      - name: "1-8-8-->0-4-4"
        generics:
          AFmt_g: '"(1,8,8)"'
          BFmt_g: '"(1,8,8)"'
          ResultFmt_g: '"(0,4,4)"'
  # olo_fix_compare
  - entity_name: "olo_fix_compare"
    configurations:
      - name: "1-8-8-vs-0-4-4"
        generics:
          AFmt_g: '"(1,8,8)"'
          BFmt_g: '"(0,4,4)"'
          Comparison_g: '">="'
  # olo_fix_from_real
  - entity_name: "olo_fix_from_real"
    configurations:
      - name: "1-8-8"
        generics:
          ResultFmt_g: '"(1,8,8)"'
          Value_g: 1.2345
  # olo_fix_limit
  - entity_name: "olo_fix_limit"
    configurations:
      - name: "1-8-8-->0-4-4"
        generics:
          InFmt_g: '"(1,8,8)"'
          LimLoFmt_g: '"(0,4,4)"'
          LimHiFmt_g: '"(0,4,4)"'
          ResultFmt_g: '"(0,4,4)"'
  # olo_fix_mult
  - entity_name: "olo_fix_mult"
    configurations:
      - name: "18x18"
        generics:
          AFmt_g: '"(1,7,10)"'
          BFmt_g: '"(1,7,10)"'
          ResultFmt_g: '"(1,15,20)"'
      - name: "32x32"
        generics:
          AFmt_g: '"(1,0,31)"'
          BFmt_g: '"(1,0,31)"'
          ResultFmt_g: '"(1,1,62)"'
          OpRegs_g: 6
        in_reduce:
          In_A: 32
          In_B: 32
        out_reduce:
          Out_Result: 64
  # olo_fix_neg
  - entity_name: "olo_fix_neg"
    configurations:
      - name: "1-8-8-->1-4-4"
        generics:
          AFmt_g: '"(1,8,8)"'
          ResultFmt_g: '"(1,4,4)"'
  # olo_fix_resize
  - entity_name: "olo_fix_resize"
    configurations:
      - name: "1-8-8-->0-4-4"
        generics:
          AFmt_g: '"(1,8,8)"'
          ResultFmt_g: '"(0,4,4)"'
  # olo_fix_round
  - entity_name: "olo_fix_round"
    configurations:
      - name: "1-8-8-->1,9,4"
        generics:
          AFmt_g: '"(1,8,8)"'
          ResultFmt_g: '"(1,9,4)"'
          Round_g: '"NonSymPos_s"'
  # olo_fix_saturate
  - entity_name: "olo_fix_saturate"
    configurations:
      - name: "1-8-8-->1,4,8"
        generics:
          AFmt_g: '"(1,8,8)"'
          ResultFmt_g: '"(1,4,8)"'
          Saturate_g: '"Sat_s"'
  # olo_fix_sub
  - entity_name: "olo_fix_sub"
    configurations:
      - name: "1-8-8-->0-4-4"
        generics:
          AFmt_g: '"(1,8,8)"'
          BFmt_g: '"(1,8,8)"'
          ResultFmt_g: '"(0,4,4)"'
  # olo_fix_cordic_rot
  - entity_name: "olo_fix_cordic_rot"
    fixed_generics:
      InMagFmt_g: '"(0, 0, 16)"'
      InAngFmt_g: '"(0, 0, 15)"'
      OutFmt_g: '"(1, 0, 16)"'
    configurations:
      - name: "pipelined"
        generics:   
          Mode_g: '"Pipelined"'
      - name: "serial"
        generics:   
          Mode_g: '"Serial"'
          GainCorrCoefFmt_g: '"NONE"'
  # olo_fix_cordic_vect
  - entity_name: "olo_fix_cordic_vect"
    fixed_generics:
      InFmt_g: '"(1, 0, 16)"'
      OutAngFmt_g: '"(0, 0, 15)"'
      OutMagFmt_g: '"(0, 1, 16)"'
    configurations:
      - name: "pipelined"
        generics:   
          Mode_g: '"Pipelined"'
      - name: "serial"
        generics:   
          Mode_g: '"Serial"'
          GainCorrCoefFmt_g: '"NONE"'
  # olo_fix_bin_div
  - entity_name: "olo_fix_bin_div"
    fixed_generics:
      NumFmt_g: '"(0, 2, 10)"'
      DenomFmt_g: '"(1, 3, 4)"'
      OutFmt_g: '"(1, 8, 12)"'
    configurations:
      - name: "pipelined"
        generics:   
          Mode_g: '"Pipelined"'
      - name: "serial"
        generics:   
          Mode_g: '"Serial"'
  # olo_fix_cic_dec_tdm
  - entity_name: "olo_fix_cic_dec_tdm"
    configurations:
      - name: "default"
        generics:   
          Ratio_g: '8'
          Order_g: '3'
          InFmt_g: '"(1, 0, 15)"'
          OutFmt_g: '"(1, 0, 15)"'
  # olo_fix_cic_dec_par_tdm
  - entity_name: "olo_fix_cic_dec_par_tdm"
    configurations:
      - name: "default"
        generics:   
          Ratio_g: '8'
          Order_g: '3'
          InFmt_g: '"(1, 0, 15)"'
          OutFmt_g: '"(1, 0, 15)"'
  # olo_fix_cplx_addsub
  - entity_name: "olo_fix_cplx_addsub"
    configurations:
      - name: "1-8-8-->0-4-4"
        generics:
          AFmt_g: '"(1,8,8)"'
          BFmt_g: '"(1,8,8)"'
          ResultFmt_g: '"(0,4,4)"'
  # olo_fix_madd
  - entity_name: "olo_fix_madd"
    configurations:
      - name: "16+16x16"
        generics:
          AFmt_g: '"(1,9,6)"'
          CFmt_g: '"(1,9,6)"'
          BFmt_g: '"(1,9,6)"'
          AddChainFmt_g: '"(1,30,12)"'
          PreAdd_g: true
        in_reduce:
          InA_Data: 16
          InB_Data: 16
          InC_Data: 16
          MaccIn: 43
        out_reduce:
          Out_Data: 43
  # olo_fix_cplx_mult
  - entity_name: "olo_fix_cplx_mult"
    configurations:
      - name: MULT3
        generics:
          Mode_g: '"MULT"'
          Implementation_g: '"MULT3"'
          AFmt_g: '"(1,0,15)"'
          BFmt_g: '"(1,0,15)"'
          ResultFmt_g: '"(1,0,15)"'
          MultRegs_g: 2
        in_reduce:
          InA_I: 16
          InA_Q: 16
          InA_IQ: 16
          InB_I: 16
          InB_Q: 16
          InB_IQ: 16
        out_reduce:
          Out_I: 16
          Out_Q: 16
          Out_IQ: 16
      - name: MULT4
        generics:
          Mode_g: '"MULT"'
          Implementation_g: '"MULT4"'
          AFmt_g: '"(1,0,15)"'
          BFmt_g: '"(1,0,15)"'
          ResultFmt_g: '"(1,0,15)"'
          MultRegs_g: 2
        in_reduce:
          InA_I: 16
          InA_Q: 16
          InA_IQ: 16
          InB_I: 16
          InB_Q: 16
          InB_IQ: 16
        out_reduce:
          Out_I: 16
          Out_Q: 16
          Out_IQ: 16
      - name: TDM
        generics:
          Mode_g: '"MULT"'
          IqHandling_g: '"TDM"'
          AFmt_g: '"(1,0,15)"'
          BFmt_g: '"(1,0,15)"'
          ResultFmt_g: '"(1,0,15)"'
          MultRegs_g: 2
        in_reduce:
          InA_I: 16
          InA_Q: 16
          InA_IQ: 16
          InB_I: 16
          InB_Q: 16
          InB_IQ: 16
        out_reduce:
          Out_I: 16
          Out_Q: 16
          Out_IQ: 16
  # olo_fix_mix_r2c
  - entity_name: "olo_fix_mix_r2c"
    configurations:
      - name: "standard"
        generics:
          InFmt_g: '"(1,0,15)"'
          MixFmt_g: '"(1,0,15)"'
          OutFmt_g: '"(1,0,15)"'
          MultRegs_g: 2
        in_reduce:
          In_SigReal: 16
          In_MixI: 16
          In_MixQ: 16
        out_reduce:
          Out_I: 16
          Out_Q: 16
  # olo_fix_sample_hold
  - entity_name: "olo_fix_sample_hold"
    configurations:
      - name: "default"
        generics:   
          Fmt_g: '"(1, 8, 4)"'
  # olo_fix_mov_avg
  - entity_name: "olo_fix_mov_avg"
    configurations:
      - name: "default"
        generics:   
          InFmt_g: '"(1, 0, 15)"'
          OutFmt_g: '"(1, 0, 15)"'
          Taps_g: 23
