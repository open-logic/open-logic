files:
  include:
    - "../../../src/base/**/*.vhd"
    - "../../../src/ft/**/*.vhd"

exclude_entities:
  - "olo_private_*"
  - "olo_base_*"

entities:

  # ============================================================
  # olo_ft_ecc_encode
  # ============================================================
  - entity_name: "olo_ft_ecc_encode"
    configurations:
      - name: "w16-pipe0"
        generics: { Width_g: 16, Pipeline_g: 0 }
      - name: "w32-pipe0"
        generics: { Width_g: 32, Pipeline_g: 0 }
      - name: "w64-pipe0"
        generics: { Width_g: 64, Pipeline_g: 0 }
        in_reduce: { In_Data: 64, In_BitFlip: 72 }
        out_reduce: { Out_Codeword: 72 }
      - name: "w128-pipe0"
        generics: { Width_g: 128, Pipeline_g: 0 }
        in_reduce: { In_Data: 128, In_BitFlip: 137 }
        out_reduce: { Out_Codeword: 137 }
      - name: "w64-pipe1"
        generics: { Width_g: 64, Pipeline_g: 1 }
        in_reduce: { In_Data: 64, In_BitFlip: 72 }
        out_reduce: { Out_Codeword: 72 }
      - name: "w128-pipe1"
        generics: { Width_g: 128, Pipeline_g: 1 }
        in_reduce: { In_Data: 128, In_BitFlip: 137 }
        out_reduce: { Out_Codeword: 137 }

  # ============================================================
  # olo_ft_ecc_decode
  # ============================================================
  - entity_name: "olo_ft_ecc_decode"
    configurations:
      - name: "w16-pipe0"
        generics: { Width_g: 16, Pipeline_g: 0 }
      - name: "w32-pipe0"
        generics: { Width_g: 32, Pipeline_g: 0 }
      - name: "w64-pipe0"
        generics: { Width_g: 64, Pipeline_g: 0 }
        in_reduce: { In_Codeword: 72 }
        out_reduce: { Out_Data: 64 }
      - name: "w128-pipe0"
        generics: { Width_g: 128, Pipeline_g: 0 }
        in_reduce: { In_Codeword: 137 }
        out_reduce: { Out_Data: 128 }
      - name: "w64-pipe1"
        generics: { Width_g: 64, Pipeline_g: 1 }
        in_reduce: { In_Codeword: 72 }
        out_reduce: { Out_Data: 64 }
      - name: "w128-pipe1"
        generics: { Width_g: 128, Pipeline_g: 1 }
        in_reduce: { In_Codeword: 137 }
        out_reduce: { Out_Data: 128 }

  # ============================================================
  # olo_ft_ram_sp
  # ============================================================
  - entity_name: "olo_ft_ram_sp"
    fixed_generics:
      Depth_g: 256
    configurations:
      - name: "w16-ecc0-lat1"
        generics: { Width_g: 16, EccPipeline_g: 0, RamRdLatency_g: 1 }
      - name: "w32-ecc0-lat1"
        generics: { Width_g: 32, EccPipeline_g: 0, RamRdLatency_g: 1 }
      - name: "w64-ecc0-lat1"
        generics: { Width_g: 64, EccPipeline_g: 0, RamRdLatency_g: 1 }
        in_reduce: { WrData: 64, WrEccBitFlip: 72 }
        out_reduce: { RdData: 64 }
      - name: "w128-ecc0-lat1"
        generics: { Width_g: 128, EccPipeline_g: 0, RamRdLatency_g: 1 }
        in_reduce: { WrData: 128, WrEccBitFlip: 137 }
        out_reduce: { RdData: 128 }
      - name: "w16-ecc1-lat1"
        generics: { Width_g: 16, EccPipeline_g: 1, RamRdLatency_g: 1 }
      - name: "w32-ecc1-lat1"
        generics: { Width_g: 32, EccPipeline_g: 1, RamRdLatency_g: 1 }
      - name: "w64-ecc1-lat1"
        generics: { Width_g: 64, EccPipeline_g: 1, RamRdLatency_g: 1 }
        in_reduce: { WrData: 64, WrEccBitFlip: 72 }
        out_reduce: { RdData: 64 }
      - name: "w128-ecc1-lat1"
        generics: { Width_g: 128, EccPipeline_g: 1, RamRdLatency_g: 1 }
        in_reduce: { WrData: 128, WrEccBitFlip: 137 }
        out_reduce: { RdData: 128 }
      - name: "w16-ecc0-lat2"
        generics: { Width_g: 16, EccPipeline_g: 0, RamRdLatency_g: 2 }
      - name: "w32-ecc0-lat2"
        generics: { Width_g: 32, EccPipeline_g: 0, RamRdLatency_g: 2 }
      - name: "w64-ecc0-lat2"
        generics: { Width_g: 64, EccPipeline_g: 0, RamRdLatency_g: 2 }
        in_reduce: { WrData: 64, WrEccBitFlip: 72 }
        out_reduce: { RdData: 64 }
      - name: "w128-ecc0-lat2"
        generics: { Width_g: 128, EccPipeline_g: 0, RamRdLatency_g: 2 }
        in_reduce: { WrData: 128, WrEccBitFlip: 137 }
        out_reduce: { RdData: 128 }
      - name: "w16-ecc1-lat2"
        generics: { Width_g: 16, EccPipeline_g: 1, RamRdLatency_g: 2 }
      - name: "w32-ecc1-lat2"
        generics: { Width_g: 32, EccPipeline_g: 1, RamRdLatency_g: 2 }
      - name: "w64-ecc1-lat2"
        generics: { Width_g: 64, EccPipeline_g: 1, RamRdLatency_g: 2 }
        in_reduce: { WrData: 64, WrEccBitFlip: 72 }
        out_reduce: { RdData: 64 }
      - name: "w128-ecc1-lat2"
        generics: { Width_g: 128, EccPipeline_g: 1, RamRdLatency_g: 2 }
        in_reduce: { WrData: 128, WrEccBitFlip: 137 }
        out_reduce: { RdData: 128 }
