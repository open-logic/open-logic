files:
  include:
    - "../../../src/base/**/*.vhd"
    - "../../../src/ft/**/*.vhd"

exclude_entities:
  - "olo_private_*"
  - "olo_base_*"

entities:

  # ============================================================
  # olo_ft_ecc_encode
  # ============================================================
  - entity_name: "olo_ft_ecc_encode"
    configurations:
      - name: "w64-pipe1"
        generics: { Width_g: 64, Pipeline_g: 1 }
        in_reduce: { In_Data: 64, In_BitFlip: 72 }
        out_reduce: { Out_Codeword: 72 }

  # ============================================================
  # olo_ft_ecc_decode
  # ============================================================
  - entity_name: "olo_ft_ecc_decode"
    configurations:
      - name: "w64-pipe2"
        generics: { Width_g: 64, Pipeline_g: 2 }
        in_reduce: { In_Codeword: 72, In_BitFlip: 72 }
        out_reduce: { Out_Data: 64 }

  # ============================================================
  # olo_ft_ram_sp
  # ============================================================
  - entity_name: "olo_ft_ram_sp"
    fixed_generics:
      Depth_g: 256
    configurations:
      - name: "w64-ecc2-lat1"
        generics: { Width_g: 64, EccPipeline_g: 2, RamRdLatency_g: 1 }
        in_reduce: { WrData: 64, ErrInj_BitFlip: 72 }
        out_reduce: { RdData: 64 }
